appId: app.formatbuddy.desktop
productName: FormatBuddy
copyright: Copyright (c) ${author}
directories:
  output: dist
  buildResources: resources

files:
  - out/**/*
  - package.json
  - "!**/.vscode/*"
  - "!**/{.eslintrc.cjs,.eslintrc,.prettierrc,.editorconfig,.gitignore,.npmrc}"
  - "!**/{tsconfig.*,vite.config.*,vitest.config.*,electron-builder.yml,electron.vite.config.*}"

extraResources:
  - from: resources/powershell
    to: powershell
  - from: resources/fonts
    to: fonts
  - from: resources/icons
    to: icons

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-Setup-${version}-${arch}.${ext}
  icon: resources/icons/app-icon.ico
  # Phase 1: unsigned. macOS cross-build cannot run Windows signtool.
  # Ryan must accept SmartScreen warning on first launch on Windows.
  signtoolOptions: null
  signAndEditExecutable: false
  verifyUpdateCodeSignature: false

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: FormatBuddy
  installerLanguages:
    - ko_KR
    - en_US

asar: true
asarUnpack:
  - resources/**

publish:
  - provider: github
    owner: ryan-formatbuddy
    repo: formatbuddy-desktop
    releaseType: release
    # ⚠️ Auto-update only works when this repo is PUBLIC.
    # While the repo is private, packaged clients hit unauthenticated
    # GitHub API endpoints and get 404 — the in-app updater silently
    # fails. To enable real auto-update either:
    #   1. Make the repo public:
    #      gh repo edit ryan-formatbuddy/formatbuddy-desktop --visibility public
    #   2. Or switch this provider to a generic/private feed where each
    #      client can authenticate.

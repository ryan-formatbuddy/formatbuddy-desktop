appId: app.formatbuddy.desktop
productName: FormatBuddy
copyright: Copyright (c) ${author}
directories:
  output: dist
  buildResources: resources

afterPack: scripts/adhoc-sign-mac.cjs

files:
  - out/**/*
  - package.json
  - "!**/.vscode/*"
  - "!**/{.eslintrc.cjs,.eslintrc,.prettierrc,.editorconfig,.gitignore,.npmrc}"
  - "!**/{tsconfig.*,vite.config.*,vitest.config.*,electron-builder.yml,electron.vite.config.*}"

extraResources:
  - from: resources/powershell
    to: powershell
  - from: resources/fonts
    to: fonts
  - from: resources/icons
    to: icons

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-Setup-${version}-${arch}.${ext}
  icon: resources/icons/app-icon.ico
  # Phase 1: unsigned. macOS cross-build cannot run Windows signtool.
  # Ryan must accept SmartScreen warning on first launch on Windows.
  signtoolOptions: null
  signAndEditExecutable: false
  verifyUpdateCodeSignature: false

mac:
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  artifactName: ${productName}-${version}-mac-${arch}.${ext}
  category: public.app-category.utilities
  icon: resources/icons/app-icon.icns
  # Built-in signing stays off until Ryan adds Developer ID signing +
  # notarization. afterPack applies an ad-hoc signature for local/test builds.
  identity: null

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: FormatBuddy
  installerLanguages:
    - ko_KR
    - en_US

asar: true
asarUnpack:
  - resources/**

publish:
  - provider: github
    owner: ryan-formatbuddy
    repo: formatbuddy-desktop
    releaseType: release
    # Repo visibility: PUBLIC (changed at v0.3.2). electron-updater can
    # now reach the GitHub Release feed unauthenticated, so in-app
    # auto-update works end-to-end for v0.2.0+ installs.
